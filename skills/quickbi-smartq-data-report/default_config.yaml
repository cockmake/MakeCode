# Quick BI 默认配置（随技能包发布）
# 自动注册产生的 user_token 也会写入此处

# QBI 域名
server_domain: https://bi.aliyun.com

# OpenAPI 认证配置（AccessKey ID / AccessKey Secret，未配置时使用内置默认值进行试用）
api_key:
api_secret:

# Quick BI 用户 ID：上传/建会话/轮询接口需传 userId 或 oapiUserId（未配置时自动注册并回填）
user_token:

# 是否从环境变量读取认证信息
use_env_property: false
